---
step_ca_user: step
step_ca_path: /etc/step-ca
step_ca_name: Homelab CA
# CA自身のTLS証明書に含めるSAN
step_ca_dns_names:
  - ca.home.arpa
  - 192.168.0.211
step_ca_address: ":443"

# ACMEで発行する証明書の有効期間。
# step-caのデフォルト(24h)は短く、更新失敗が即障害につながるため余裕を持たせる
step_ca_acme_default_cert_duration: 720h
step_ca_acme_max_cert_duration: 720h

# 初期化パスワード(ルート/中間CA鍵の暗号化に使用)。
# 平文コミット禁止のため環境変数から渡す(例: direnv / .env)
step_ca_password: "{{ lookup('ansible.builtin.env', 'STEP_CA_PASSWORD') | default('') }}"

# ルートCA(公開情報)の平文HTTP配布口の webroot(http://ca.home.arpa/root_ca.crt)
step_ca_http_webroot: /var/www/pki
