---
# FIXME: 所有者がrootのままのため。修正する
prometheus_system_group: 'root'
prometheus_scrape_configs:
  - job_name: "prometheus"
    metrics_path: "{{ prometheus_metrics_path }}"
    static_configs:
      - targets:
          - "{{ ansible_fqdn | default(ansible_host) | default('localhost') }}:9090"
  - job_name: "grafana"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["localhost:3000"]
  # インフラノードのホストメトリクス(node_exporter)
  # ※ K3sノードはkube-prometheus-stack側で収集するため対象外
  - job_name: "node"
    static_configs:
      - targets:
          - "192.168.0.210:9100" # openmediavault
          - "192.168.0.211:9100" # pki (step-ca)
          - "192.168.0.213:9100" # dns
          - "192.168.0.214:9100" # monitoring
  # NASのディスクSMART(smartctl_exporter)
  - job_name: "smartctl"
    static_configs:
      - targets:
          - "192.168.0.210:9633" # openmediavault
  # 外形監視(blackbox_exporter): HTTP疎通。https対象はTLS検証も兼ねる
  - job_name: "blackbox-http"
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          - https://grafana.home.arpa # grafana
          - https://pihole.home.arpa/admin # pi-hole
          - https://homepage.home.arpa # homepage
          - https://ca.home.arpa/health # step-ca
          - http://192.168.0.232:9090 # k3s prometheus (TLS対象外)
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: 192.168.0.214:9115
  # 外形監視(blackbox_exporter): ICMP疎通
  - job_name: "blackbox-icmp"
    metrics_path: /probe
    params:
      module: [icmp]
    static_configs:
      - targets:
          - 192.168.0.210 # openmediavault
          - 192.168.0.211 # pki (step-ca)
          - 192.168.0.213 # dns
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: 192.168.0.214:9115
  # 外形監視(blackbox_exporter): DNS解決（DNS LXCが単独クリティカルサービスのため）
  - job_name: "blackbox-dns"
    metrics_path: /probe
    params:
      module: [dns_home_arpa]
    static_configs:
      - targets:
          - 192.168.0.213:53 # dns (pi-hole)
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: 192.168.0.214:9115

# この変数を定義するとロールのデフォルトルールを置き換える(Alertmanager未導入のため
# 通知はなく Prometheus UI /alerts での可視化が目的)。{% raw %}〜{% endraw %}は
# Prometheusのテンプレート構文をJinjaの解釈から保護するため。
prometheus_alert_rules:
  - alert: TLSCertificateExpiringSoon
    expr: probe_ssl_earliest_cert_expiry - time() < 14 * 24 * 3600
    for: 1h
    labels:
      severity: warning
    annotations:
      summary: TLS certificate expires within 14 days
      description: "{% raw %}{{ $labels.instance }}{% endraw %} の証明書が14日以内に失効します。ACME自動更新の失敗を確認してください。"
  - alert: BlackboxProbeFailed
    expr: probe_success == 0
    for: 5m
    labels:
      severity: critical
    annotations:
      summary: Blackbox probe failed
      description: "{% raw %}{{ $labels.instance }}{% endraw %} への外形監視が失敗しています。"
