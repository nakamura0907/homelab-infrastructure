---
# K3sクラスター
k3s_cluster:
  children:
    # K3sサーバー
    k3s_cluster_server:
      children:
        k3s_prod_cluster_server:
        k3s_stg_cluster_server:
    # K3sエージェント
    k3s_cluster_agent:
      children:
        k3s_prod_cluster_agent:
    # 運用K3sクラスター
    k3s_prod_cluster:
      children:
        k3s_prod_cluster_server:
          hosts:
            192.168.0.110:
        k3s_prod_cluster_agent:
          hosts:
            192.168.0.111:
            192.168.0.112:
    # 検証K3sクラスター
    k3s_stg_cluster:
      children:
        k3s_stg_cluster_server:
          hosts:
            192.168.0.120:
# 監視サーバー
monitoring:
  children:
    prometheus:
      hosts:
        192.168.0.214:
    grafana:
      hosts:
        192.168.0.214:
# DNSサーバー (Pi-hole + Unbound)
dns:
  hosts:
    192.168.0.213:
# 内部CA (step-ca)
pki:
  hosts:
    192.168.0.211:
# 監視対象のインフラノード（非K3s）: node_exporter / ログ収集(Alloy)を導入する
# ※ K3sノードはkube-prometheus-stackで収集済みのため含めない
# ※ Proxmoxホストは監視対象外
infra_nodes:
  hosts:
    192.168.0.210:  # OpenMediaVault (NAS)
    192.168.0.211:  # PKI (step-ca)
    192.168.0.213:  # DNS (Pi-hole + Unbound)
    192.168.0.214:  # monitoring (Prometheus/Grafana自身)
