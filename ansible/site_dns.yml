---
- name: Setup DNS (Pi-hole + Unbound)
  hosts: dns
  roles:
    # Docker Engine + Compose plugin をインストール
    - role: geerlingguy.docker

  handlers:
    # 設定ファイル変更時に Pi-hole を再起動して custom.list / dnsmasq.d を再読込
    - name: Restart pihole
      community.docker.docker_compose_v2:
        project_src: "{{ dns_compose_dir }}"
        services:
          - pihole
        state: restarted

    - name: Restart caddy
      community.docker.docker_compose_v2:
        project_src: "{{ dns_compose_dir }}"
        services:
          - caddy
        state: restarted

  pre_tasks:
    - name: Ensure the Pi-hole web password is provided via environment
      ansible.builtin.assert:
        that:
          - dns_web_password | length > 0
        fail_msg: >-
          DNS_WEB_PASSWORD を環境変数で設定してください（例: direnv / .env）。
          詳細は docs/secret-management.md 参照。
        quiet: true

  tasks:
    - name: Check whether systemd-resolved is present
      ansible.builtin.stat:
        path: /lib/systemd/system/systemd-resolved.service
      register: dns_resolved_unit

    # Debian 標準 LXC テンプレートでは通常存在しないが、存在する場合は
    # ポート 53 を解放するために停止する
    - name: Stop and disable systemd-resolved to free port 53
      ansible.builtin.systemd:
        name: systemd-resolved
        state: stopped
        enabled: false
      when: dns_resolved_unit.stat.exists

    # CaddyコンテナがルートCAをbind mountするため(ファイル欠如だとDockerがディレクトリを作ってしまう)
    - name: Check whether the root CA certificate is present
      ansible.builtin.stat:
        path: /usr/local/share/ca-certificates/homelab-root-ca.crt
      register: dns_root_ca

    - name: Assert the root CA certificate has been distributed
      ansible.builtin.assert:
        that:
          - dns_root_ca.stat.exists
        fail_msg: ルートCA証明書がありません。先に site_pki.yml を実行してください。
        quiet: true

    - name: Create compose project directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - "{{ dns_compose_dir }}"
        - "{{ dns_compose_dir }}/pihole/etc-pihole"
        - "{{ dns_compose_dir }}/pihole/etc-dnsmasq.d"
        - "{{ dns_compose_dir }}/unbound/conf.d"
        - "{{ dns_compose_dir }}/caddy"

    - name: Deploy Pi-hole custom DNS records (home.arpa)
      ansible.builtin.template:
        src: templates/dns/custom.list.j2
        dest: "{{ dns_compose_dir }}/pihole/etc-pihole/custom.list"
        mode: "0644"
      notify: Restart pihole

    - name: Deploy dnsmasq home.arpa non-forward config
      ansible.builtin.template:
        src: templates/dns/02-home-arpa.conf.j2
        dest: "{{ dns_compose_dir }}/pihole/etc-dnsmasq.d/02-home-arpa.conf"
        mode: "0644"
      notify: Restart pihole

    - name: Deploy Unbound home.arpa config
      ansible.builtin.template:
        src: templates/dns/unbound-home-arpa.conf.j2
        dest: "{{ dns_compose_dir }}/unbound/conf.d/home-arpa.conf"
        mode: "0644"

    - name: Deploy Caddyfile (Pi-hole admin TLS)
      ansible.builtin.template:
        src: templates/dns/Caddyfile.j2
        dest: "{{ dns_compose_dir }}/caddy/Caddyfile"
        mode: "0644"
      notify: Restart caddy

    - name: Deploy compose file
      ansible.builtin.template:
        src: templates/dns/compose.yaml.j2
        dest: "{{ dns_compose_dir }}/compose.yaml"
        mode: "0644"

    - name: Start Pi-hole + Unbound stack
      community.docker.docker_compose_v2:
        project_src: "{{ dns_compose_dir }}"
        state: present
        remove_orphans: true
