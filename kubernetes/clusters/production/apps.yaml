---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: apps
  namespace: flux-system
spec:
  interval: 10m0s
  dependsOn:
    - name: metallb-system
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./kubernetes/apps/production
  prune: true
  wait: true
  timeout: 5m0s
  # SOPS で暗号化した Secret (*.sops.yaml) を復号する。
  # 復号鍵は site_flux.yml が投入する flux-system/sops-age Secret。
  decryption:
    provider: sops
    secretRef:
      name: sops-age