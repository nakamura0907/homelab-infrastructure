---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: metallb-system
  namespace: flux-system
spec:
  interval: 1h
  retryInterval: 1m
  timeout: 5m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./kubernetes/infrastructure/metallb-system
  prune: true
  patches:
    - patch: |-
        apiVersion: metallb.io/v1beta1
        kind: IPAddressPool
        metadata:
          name: first-pool
          namespace: metallb-system
        spec:
          addresses:
          - 192.168.0.160-192.168.0.169
      target:
        name: first-pool
        kind: IPAddressPool

---
# 各 namespace の Pod 間通信を最小権限化する NetworkPolicy 群(staging は metallb-system + nginx)。
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: network-policies
  namespace: flux-system
spec:
  interval: 1h
  retryInterval: 1m
  timeout: 5m
  dependsOn:
    - name: metallb-system
    # nginx の namespace は apps が作成する
    - name: apps
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./kubernetes/infrastructure/network-policies/staging
  prune: true
  wait: true