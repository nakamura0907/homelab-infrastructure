---
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: homepage
  namespace: homepage
spec:
  values:
    env:
      # Traefik Ingress(https://homepage.home.arpa)経由での提供に合わせる。
      # 旧LB IP のままだと Homepage が Host ヘッダを拒否する(Host validation failed)。
      - name: HOMEPAGE_ALLOWED_HOSTS
        value: "homepage.home.arpa"
