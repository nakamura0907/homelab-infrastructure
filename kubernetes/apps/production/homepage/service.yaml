---
apiVersion: v1
kind: Service
metadata:
  name: homepage
  namespace: homepage
spec:
  selector:
    app.kubernetes.io/instance: homepage
  # 公開はTraefik Ingress(https://homepage.home.arpa)経由に集約したためClusterIPに変更
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 3000
      protocol: TCP
      name: http
