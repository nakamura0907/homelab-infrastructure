---
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: homepage
  namespace: homepage
spec:
  releaseName: homepage
  chart:
    spec:
      chart: homepage
      sourceRef:
        kind: HelmRepository
        name: jameswynn
        namespace: homepage
  interval: 50m
  values:
    service:
      main:
        enabled: false
    config:
      useExistingConfigMap: existing-homepage-configmap
