---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: metrics
  labels:
    app.kubernetes.io/part-of: network-policies
spec:
  podSelector: {}
  policyTypes:
    - Ingress
---
# namespace 内の通信を全許可(prometheus -> alertmanager:9093 / kube-state-metrics / operator など)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-intra-namespace
  namespace: metrics
  labels:
    app.kubernetes.io/part-of: network-policies
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector: {}
---
# apiserver(server node のホスト IP 発)からの prometheus-operator admission webhook(containerPort 10250)を許可。
# 無いと ServiceMonitor / PrometheusRule の apply(= Flux の HelmRelease reconcile)が全て失敗する。
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-webhook
  namespace: metrics
  labels:
    app.kubernetes.io/part-of: network-policies
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - ipBlock:
            cidr: 192.168.0.0/24
      ports:
        - port: 10250
          protocol: TCP
---
# 外部 Grafana(192.168.0.214)が LB .232 経由で Prometheus(containerPort 9090)へクエリする分。
# LB 側で loadBalancerSourceRanges: 192.168.0.214/32 に既に制限済み。
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-lan-prometheus
  namespace: metrics
  labels:
    app.kubernetes.io/part-of: network-policies
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - ipBlock:
            cidr: 192.168.0.0/24
      ports:
        - port: 9090
          protocol: TCP
