---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: traefik
  labels:
    app.kubernetes.io/part-of: network-policies
spec:
  podSelector: {}
  policyTypes:
    - Ingress
---
# entrypoint(web=8000 / websecure=8443, chart の containerPort)への流入を許可。
# - ipBlock 192.168.0.0/24: LAN クライアント + externalTrafficPolicy: Cluster による node SNAT
# - namespaceSelector: {}   : クラスタ内クライアント(cert-manager の ACME セルフチェックが LB .230 経由でヘアピンする分を含む)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-entrypoints
  namespace: traefik
  labels:
    app.kubernetes.io/part-of: network-policies
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - ipBlock:
            cidr: 192.168.0.0/24
        - namespaceSelector: {}
      ports:
        - port: 8000
          protocol: TCP
        - port: 8443
          protocol: TCP
