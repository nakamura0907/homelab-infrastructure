version: "3"

# dir: taskfiles
vars:
  TERRAFORM_DIR: "../terraform"

tasks:
  proxmox:init:
    desc: Run terraform init
    dir: "{{.TERRAFORM_DIR}}/proxmox/"
    cmds:
      - terraform init

  proxmox:plan:
    desc: Run terraform plan
    dir: "{{.TERRAFORM_DIR}}/proxmox/"
    cmds:
      - terraform plan

  proxmox:apply:
    desc: Run terraform apply
    dir: "{{.TERRAFORM_DIR}}/proxmox/"
    cmds:
      - terraform apply -auto-approve

  proxmox:destroy:
    desc: Run terraform destroy
    dir: "{{.TERRAFORM_DIR}}/proxmox/"
    cmds:
      - terraform destroy

  vault:init:
    desc: Run terraform init
    dir: "{{.TERRAFORM_DIR}}/vault-config/"
    cmds:
      - terraform init

  vault:plan:
    desc: Run terraform plan
    dir: "{{.TERRAFORM_DIR}}/vault-config/"
    cmds:
      - terraform plan

  vault:apply:
    desc: Run terraform apply
    dir: "{{.TERRAFORM_DIR}}/vault-config/"
    cmds:
      - terraform apply -auto-approve

  vault:destroy:
    desc: Run terraform destroy
    dir: "{{.TERRAFORM_DIR}}/vault-config/"
    cmds:
      - terraform destroy

  fmt:
    desc: Run terraform fmt
    dir: "{{.TERRAFORM_DIR}}/"
    cmds:
      - terraform fmt -recursive
